server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Angular client-side routing — always serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to the backend container
    location /api/ {
        proxy_pass         http://tradej-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Yahoo Finance proxy — rewrite /yf/... to /api/yf/... on the backend
    location /yf/ {
        rewrite ^/yf/(.*)$ /api/yf/$1 break;
        proxy_pass         http://tradej-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache fingerprinted assets for 1 year; index.html never cached
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
