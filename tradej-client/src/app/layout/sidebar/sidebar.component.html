<div class="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <span class="logo-icon">📊</span>
    <span class="logo-text">TradeJ</span>
  </div>

  <!-- Account Selector -->
  <div class="account-section">
    <div class="section-label">Active Account</div>
    <div class="acc-wrap">
      <button class="acc-trigger" (click)="togglePanel()">
        <span class="acc-trigger-label">{{ triggerLabel }}</span>
        <i class="pi" [class.pi-chevron-down]="!panelOpen" [class.pi-chevron-up]="panelOpen"></i>
      </button>

      @if (panelOpen) {
        <div class="acc-panel">
          <!-- All accounts row -->
          <label class="acc-row acc-all-row">
            <input
              type="checkbox"
              [checked]="allSelected"
              (change)="toggleAll()"
            >
            <span class="acc-row-label">All accounts</span>
          </label>

          <div class="acc-divider">My accounts</div>

          @for (acc of accounts(); track acc.id) {
            <label class="acc-row">
              <input
                type="checkbox"
                [checked]="isSelected(acc.id)"
                (change)="toggleAccount(acc.id)"
              >
              <span class="broker-badge" [attr.data-broker]="acc.broker.toLowerCase()">{{ acc.broker }}</span>
              <span class="acc-name">{{ acc.name }}</span>
            </label>
          }

          <div class="acc-manage-row">
            <a routerLink="/accounts" (click)="panelOpen = false">
              <i class="pi pi-cog"></i> Manage accounts
            </a>
          </div>
        </div>
      }
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <i class="pi pi-chart-bar"></i>
      <span>Dashboard</span>
    </a>
    <a routerLink="/trades" routerLinkActive="active" class="nav-item">
      <i class="pi pi-list"></i>
      <span>Trades</span>
    </a>
    <a routerLink="/day-view" routerLinkActive="active" class="nav-item">
      <i class="pi pi-calendar"></i>
      <span>Day View</span>
    </a>
    <a routerLink="/notebook" routerLinkActive="active" class="nav-item">
      <i class="pi pi-book"></i>
      <span>Notebook</span>
    </a>
    <a routerLink="/strategies" routerLinkActive="active" class="nav-item">
      <i class="pi pi-sitemap"></i>
      <span>Strategies</span>
    </a>
    <a routerLink="/import" routerLinkActive="active" class="nav-item">
      <i class="pi pi-upload"></i>
      <span>Import</span>
    </a>
    <a routerLink="/accounts" routerLinkActive="active" class="nav-item">
      <i class="pi pi-wallet"></i>
      <span>Accounts</span>
    </a>
  </nav>
</div>
